<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sun Proactive — Отклик</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--sidebar:#0d0d0d;--card:#141414;--card2:#1a1a1a;--card3:#111111;
  --text:#f0ede8;--sub:#505050;--sub2:#3a3a3a;--border:#1e1e1e;--border2:#252525;
  --accent:#10b981;--accent-bg:rgba(16,185,129,0.08);--accent-border:rgba(16,185,129,0.2);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.08);--red-border:rgba(239,68,68,0.2);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.08);--amber-border:rgba(245,158,11,0.2);
  --indigo:#818cf8;--indigo-bg:rgba(99,102,241,0.08);--indigo-border:rgba(99,102,241,0.2);
  --shadow:0 2px 16px rgba(0,0,0,0.4);
}
body.light{
  --bg:#f4f7f5;--sidebar:#ffffff;--card:#ffffff;--card2:#f0f5f2;--card3:#fafcfb;
  --text:#111111;--sub:#9ca3af;--sub2:#d1d5db;--border:#e5ede9;--border2:#dce8e2;
  --accent:#059669;--accent-bg:rgba(5,150,105,0.07);--accent-border:rgba(5,150,105,0.2);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.07);--red-border:rgba(220,38,38,0.2);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.07);--amber-border:rgba(217,119,6,0.2);
  --indigo:#4f46e5;--indigo-bg:rgba(79,70,229,0.07);--indigo-border:rgba(79,70,229,0.2);
  --shadow:0 1px 8px rgba(0,0,0,0.07);
}
html,body{height:100%;font-family:'DM Sans','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}
.layout{display:flex;min-height:100vh;}
.sidebar{width:220px;min-height:100vh;background:var(--sidebar);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:9px;padding:0 8px;margin-bottom:24px;}
.logo-box{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 45%,transparent));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.logo-text{font-size:13px;font-weight:700;color:var(--text);}
.logo-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);margin-left:2px;}
.nav-section{font-size:10px;font-weight:700;color:var(--sub2);letter-spacing:0.8px;padding:0 8px;margin:14px 0 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:400;color:var(--sub);border:1px solid transparent;transition:all 0.15s;background:transparent;text-decoration:none;width:100%;}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600;border-color:var(--accent-border);}
.nav-item:hover:not(.active){background:var(--card2);color:var(--text);}
.nav-item .badge{margin-left:auto;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.nav-item .badge.green{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);}
.sidebar-bottom{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
.theme-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--sub);font-size:12.5px;font-family:inherit;width:100%;transition:all 0.15s;}
.theme-btn:hover{background:var(--card2);}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--sidebar);position:sticky;top:0;z-index:20;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:16px;text-decoration:none;}
.back-btn:hover{background:var(--card2);color:var(--text);}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);}
.topbar-sub{font-size:11.5px;color:var(--sub);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.curator-chip{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 5px;border-radius:20px;background:var(--card2);border:1px solid var(--border);cursor:pointer;text-decoration:none;transition:all 0.15s;}
.curator-chip:hover{border-color:var(--border2);}
.curator-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--amber),color-mix(in srgb,var(--amber) 50%,transparent));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.curator-name{font-size:12px;font-weight:600;color:var(--text);}
.curator-role{font-size:10px;color:var(--sub);}
.body{padding:22px 24px;flex:1;overflow-y:auto;}
.detail-grid{display:grid;grid-template-columns:1fr 300px;gap:16px;}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.section-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.section-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;}
.section-body{padding:16px 18px;}
.detail-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:4px;}
.detail-value{font-size:13.5px;color:var(--text);font-weight:500;margin-bottom:14px;}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;}
.status-active{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
.status-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.match-ring{width:80px;height:80px;border-radius:50%;background:conic-gradient(var(--accent) 82%,var(--border) 0);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.match-inner{width:60px;height:60px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent);}
.btn{padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.1);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.btn-danger:hover{filter:brightness(1.1);}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--sub);}
.btn-secondary:hover{border-color:var(--border2);color:var(--text);background:var(--card2);}
.quota-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-top:4px;}
.quota-fill{height:100%;border-radius:6px;background:var(--accent);}
.quota-fill.warn{background:var(--amber);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
@media(max-width:900px){.detail-grid{grid-template-columns:1fr;}}
@media(max-width:700px){.sidebar{width:56px;}.logo-text,.logo-badge,.nav-item span:not(:first-child),.nav-section{display:none;}.logo{justify-content:center;}.nav-item{justify-content:center;padding:8px;}}
</style>
</head>
<body>
<div class="layout">

<div class="sidebar">
  <div class="logo">
    <div class="logo-box">☀️</div>
    <div class="logo-text">Sun Proactive <span class="logo-badge">Куратор</span></div>
  </div>
  <div class="nav-section">Главное</div>
  <a class="nav-item" href="curator-dashboard.html"><span></span><span>Дашборд</span></a>
  <a class="nav-item" href="curator-tasks.html"><span></span><span>Лента задач</span></a>
  <a class="nav-item active" href="curator-applications.html"><span></span><span>Отклики</span><span class="badge">5</span></a>
  <div class="nav-section">Управление</div>
  <a class="nav-item" href="curator-volunteers.html"><span></span><span>Волонтёры</span><span class="badge green">24</span></a>
  <a class="nav-item" href="curator-events.html"><span></span><span>Мероприятия</span></a>
  <a class="nav-item" href="curator-analytics.html"><span></span><span>Аналитика</span></a>
  <div class="nav-section">Настройки</div>
  <a class="nav-item" href="curator-profile.html"><span></span><span>Мой профиль</span></a>
  <a class="nav-item" href="curator-settings.html"><span></span><span>Настройки</span></a>
  <div class="sidebar-bottom">
    <button class="theme-btn" onclick="toggleTheme()">
      <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <span>Светлая тема</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="back-btn" href="curator-applications.html">←</a>
      <div>
        <div class="topbar-title" id="app-page-title">Детали отклика</div>
        <div class="topbar-sub">Sun Proactive · Апрель 2026</div>
      </div>
    </div>
    <div class="topbar-right">
      <a class="curator-chip" href="curator-profile.html">
        <div class="curator-avatar">АК</div>
        <div><div class="curator-name">Айгерим К.</div><div class="curator-role">Куратор</div></div>
      </a>
    </div>
  </div>

  <div class="body">
    <div id="app-content"></div>
  </div>
</div>
</div>

<script>
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.querySelector('.theme-btn span').textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
  const icon = document.getElementById('theme-icon');
  icon.innerHTML = isDark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

const APPS = {
  1: { volunteer:'Зарина Нурланова', volId:3, task:'Эко-субботник в парке Горького', taskId:1, match:82, time:'10 мин назад', spots:4, status:'pending', date:'5 апреля 2026', location:'Парк Горького, Алматы', hours:'09:00–14:00', cat:'🌿 Экология' },
  2: { volunteer:'Мадина Касенова', volId:4, task:'SMM для молодёжного фестиваля', taskId:2, match:91, time:'1 ч назад', spots:2, status:'pending', date:'12 апреля 2026', location:'Центр города', hours:'Удалённо', cat:'📱 Медиа' },
  3: { volunteer:'Руслан Ахметов', volId:5, task:'Марафон по сбору одежды', taskId:6, match:74, time:'3 ч назад', spots:3, status:'pending', date:'20 апреля 2026', location:'Разные точки', hours:'09:00–18:00', cat:'👕 Социальное' },
  4: { volunteer:'Алина Смирнова', volId:1, task:'Фотосъёмка городских мурал', taskId:5, match:94, time:'вчера', spots:2, status:'approved', date:'25 апреля 2026', location:'Разные районы', hours:'Гибкий', cat:'🎨 Искусство' },
  5: { volunteer:'Данияр Мухамедов', volId:2, task:'Помощь в библиотеке для детей', taskId:4, match:87, time:'вчера', spots:3, status:'approved', date:'18 апреля 2026', location:'Центральная библиотека', hours:'13:00–17:00', cat:'📚 Образование' },
};

const params = new URLSearchParams(location.search);
const id = params.get('id') || '1';
const a = APPS[id] || APPS[1];

document.getElementById('app-page-title').textContent = `${a.volunteer} → ${a.task}`;

const matchPct = a.match;
const conicVal = `conic-gradient(var(--accent) ${matchPct}%,var(--border) 0)`;
const isPending = a.status === 'pending';

document.getElementById('app-content').innerHTML = `
<div class="detail-grid">
  <div>
    <div class="section-card">
      <div class="section-head">
        <div class="section-title">📩 Информация об отклике</div>
        <span class="status-badge ${isPending ? 'status-pending' : 'status-active'}">${isPending ? '⏳ Ожидает решения' : '✓ Одобрен'}</span>
      </div>
      <div class="section-body">
        <div class="detail-label">Волонтёр</div>
        <div class="detail-value"><a href="curator-volunteer-details.html?id=${a.volId}" style="color:var(--accent);text-decoration:none;">${a.volunteer} →</a></div>
        <div class="detail-label">Задача</div>
        <div class="detail-value"><a href="curator-tasks.html?id=${a.taskId}" style="color:var(--accent);text-decoration:none;">${a.task} →</a></div>
        <div class="detail-label">Категория</div>
        <div class="detail-value">${a.cat}</div>
        <div class="detail-label">Дата мероприятия</div>
        <div class="detail-value">${a.date}</div>
        <div class="detail-label">Место / Время</div>
        <div class="detail-value">${a.location} · ${a.hours}</div>
        <div class="detail-label">Подана</div>
        <div class="detail-value">${a.time}</div>
        <div class="detail-label">Свободных мест</div>
        <div class="detail-value">${a.spots}</div>
        ${isPending ? `<div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn btn-primary" onclick="approveThis()">✓ Одобрить отклик</button>
          <button class="btn btn-danger" onclick="rejectThis()">✕ Отклонить</button>
        </div>` : `<div style="background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--accent);font-weight:600;">✅ Отклик одобрен</div>`}
      </div>
    </div>
  </div>
  <div>
    <div class="section-card">
      <div class="section-head"><div class="section-title">🤖 AI-анализ совпадения</div></div>
      <div class="section-body" style="text-align:center;">
        <div class="match-ring" style="background:${conicVal};">
          <div class="match-inner">${a.match}%</div>
        </div>
        <div style="font-size:12px;color:var(--sub);margin-bottom:12px;">Совпадение навыков с задачей</div>
        <div style="text-align:left;">
          <div style="font-size:12px;color:var(--sub);margin-bottom:4px;">Навыки</div>
          <div style="height:5px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:8px;"><div style="height:100%;width:${a.match}%;background:var(--accent);border-radius:5px;"></div></div>
          <div style="font-size:12px;color:var(--sub);margin-bottom:4px;">Опыт</div>
          <div style="height:5px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:8px;"><div style="height:100%;width:${Math.min(100,a.match+5)}%;background:var(--accent);border-radius:5px;"></div></div>
          <div style="font-size:12px;color:var(--sub);margin-bottom:4px;">Доступность</div>
          <div style="height:5px;background:var(--border);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${Math.max(50,a.match-10)}%;background:var(--amber);border-radius:5px;"></div></div>
        </div>
      </div>
    </div>
    <div class="section-card">
      <div class="section-head"><div class="section-title">⚡ Быстрые действия</div></div>
      <div class="section-body" style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-secondary" style="width:100%;text-align:left;" onclick="location.href='curator-volunteer-details.html?id=${a.volId}'">👤 Профиль волонтёра</button>
        <button class="btn btn-secondary" style="width:100%;text-align:left;" onclick="location.href='curator-tasks.html?id=${a.taskId}'">📋 Страница задачи</button>
        <button class="btn btn-secondary" style="width:100%;text-align:left;" onclick="alert('Сообщение отправлено')">✉️ Написать волонтёру</button>
      </div>
    </div>
  </div>
</div>
`;

function approveThis() {
  document.querySelector('.btn-primary').closest('.section-body').querySelector('div[style*="display:flex"]').innerHTML = '<div style="background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--accent);font-weight:600;">✅ Отклик одобрен</div>';
}
function rejectThis() {
  document.querySelector('.btn-danger').closest('.section-body').querySelector('div[style*="display:flex"]').innerHTML = '<div style="background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--red);font-weight:600;">✕ Отклик отклонён</div>';
}
</script>
<script type="module">
  import { getMyProfile } from "./supabase-sync.js";

  const profile = await getMyProfile();

  if (profile) {
    const nameEl = document.querySelector(".curator-name");
    if (nameEl) nameEl.textContent = profile.full_name || "Куратор";
  }
</script>
</body>
</html>
