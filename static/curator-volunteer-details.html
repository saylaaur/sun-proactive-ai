<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sun Proactive — Волонтёр</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--sidebar:#0d0d0d;--card:#141414;--card2:#1a1a1a;--card3:#111111;
  --text:#f0ede8;--sub:#505050;--sub2:#3a3a3a;--border:#1e1e1e;--border2:#252525;
  --accent:#10b981;--accent-bg:rgba(16,185,129,0.08);--accent-border:rgba(16,185,129,0.2);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.08);--red-border:rgba(239,68,68,0.2);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.08);--amber-border:rgba(245,158,11,0.2);
  --indigo:#818cf8;--indigo-bg:rgba(99,102,241,0.08);--indigo-border:rgba(99,102,241,0.2);
  --shadow:0 2px 16px rgba(0,0,0,0.4);
}
body.light{
  --bg:#f4f7f5;--sidebar:#ffffff;--card:#ffffff;--card2:#f0f5f2;--card3:#fafcfb;
  --text:#111111;--sub:#9ca3af;--sub2:#d1d5db;--border:#e5ede9;--border2:#dce8e2;
  --accent:#059669;--accent-bg:rgba(5,150,105,0.07);--accent-border:rgba(5,150,105,0.2);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.07);--red-border:rgba(220,38,38,0.2);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.07);--amber-border:rgba(217,119,6,0.2);
  --indigo:#4f46e5;--indigo-bg:rgba(79,70,229,0.07);--indigo-border:rgba(79,70,229,0.2);
  --shadow:0 1px 8px rgba(0,0,0,0.07);
}
html,body{height:100%;font-family:'DM Sans','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}
.layout{display:flex;min-height:100vh;}
.sidebar{width:220px;min-height:100vh;background:var(--sidebar);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:9px;padding:0 8px;margin-bottom:24px;}
.logo-box{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 45%,transparent));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.logo-text{font-size:13px;font-weight:700;color:var(--text);}
.logo-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);margin-left:2px;}
.nav-section{font-size:10px;font-weight:700;color:var(--sub2);letter-spacing:0.8px;padding:0 8px;margin:14px 0 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:400;color:var(--sub);border:1px solid transparent;transition:all 0.15s;background:transparent;text-decoration:none;width:100%;}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600;border-color:var(--accent-border);}
.nav-item:hover:not(.active){background:var(--card2);color:var(--text);}
.nav-item .badge{margin-left:auto;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.nav-item .badge.green{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);}
.sidebar-bottom{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
.theme-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--sub);font-size:12.5px;font-family:inherit;width:100%;transition:all 0.15s;}
.theme-btn:hover{background:var(--card2);}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--sidebar);position:sticky;top:0;z-index:20;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:16px;text-decoration:none;}
.back-btn:hover{background:var(--card2);color:var(--text);}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);}
.topbar-sub{font-size:11.5px;color:var(--sub);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.curator-chip{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 5px;border-radius:20px;background:var(--card2);border:1px solid var(--border);cursor:pointer;text-decoration:none;transition:all 0.15s;}
.curator-chip:hover{border-color:var(--border2);}
.curator-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--amber),color-mix(in srgb,var(--amber) 50%,transparent));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.curator-name{font-size:12px;font-weight:600;color:var(--text);}
.curator-role{font-size:10px;color:var(--sub);}
.body{padding:22px 24px;flex:1;overflow-y:auto;}
.profile-header{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;display:flex;align-items:flex-start;gap:20px;margin-bottom:16px;}
.profile-avatar-lg{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0;}
.profile-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.profile-meta{font-size:12.5px;color:var(--sub);margin-bottom:10px;}
.profile-stats{display:flex;gap:20px;margin-top:12px;}
.profile-stat{display:flex;flex-direction:column;gap:2px;}
.profile-stat-val{font-size:18px;font-weight:700;color:var(--text);}
.profile-stat-label{font-size:11px;color:var(--sub);}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;}
.status-active{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);}
.status-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.status-new{background:var(--indigo-bg);color:var(--indigo);border:1px solid var(--indigo-border);}
.status-inactive{background:var(--card2);color:var(--sub);border:1px solid var(--border);}
.two-col{display:grid;grid-template-columns:1fr 280px;gap:16px;}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.section-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.section-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;}
.section-body{padding:16px 18px;}
.skill-chip{display:inline-flex;padding:4px 10px;border-radius:6px;background:var(--card2);border:1px solid var(--border);color:var(--sub);font-size:11.5px;margin:3px;}
.score-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-top:4px;}
.score-fill{height:100%;border-radius:6px;background:var(--accent);}
.task-hist-row{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.12s;}
.task-hist-row:last-child{border-bottom:none;}
.task-hist-row:hover{background:var(--card2);}
.btn{padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.1);}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--sub);}
.btn-secondary:hover{border-color:var(--border2);color:var(--text);background:var(--card2);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}
@media(max-width:700px){.sidebar{width:56px;}.logo-text,.logo-badge,.nav-item span:not(:first-child),.nav-section{display:none;}.logo{justify-content:center;}.nav-item{justify-content:center;padding:8px;}}
</style>
</head>
<body>
<div class="layout">

<div class="sidebar">
  <div class="logo">
    <div class="logo-box">☀️</div>
    <div class="logo-text">Sun Proactive <span class="logo-badge">Куратор</span></div>
  </div>
  <div class="nav-section">Главное</div>
  <a class="nav-item" href="curator-dashboard.html"><span></span><span>Дашборд</span></a>
  <a class="nav-item" href="curator-tasks.html"><span></span><span>Лента задач</span></a>
  <a class="nav-item" href="curator-applications.html"><span></span><span>Отклики</span><span class="badge">5</span></a>
  <div class="nav-section">Управление</div>
  <a class="nav-item active" href="curator-volunteers.html"><span></span><span>Волонтёры</span><span class="badge green">24</span></a>
  <a class="nav-item" href="curator-events.html"><span></span><span>Мероприятия</span></a>
  <a class="nav-item" href="curator-analytics.html"><span></span><span>Аналитика</span></a>
  <div class="nav-section">Настройки</div>
  <a class="nav-item" href="curator-profile.html"><span></span><span>Мой профиль</span></a>
  <a class="nav-item" href="curator-settings.html"><span></span><span>Настройки</span></a>
  <div class="sidebar-bottom">
    <button class="theme-btn" onclick="toggleTheme()">
      <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <span>Светлая тема</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="back-btn" href="curator-volunteers.html">←</a>
      <div>
        <div class="topbar-title" id="vol-page-name">Профиль волонтёра</div>
        <div class="topbar-sub">Sun Proactive · Алматы · Апрель 2026</div>
      </div>
    </div>
    <div class="topbar-right">
      <a class="curator-chip" href="curator-profile.html">
        <div class="curator-avatar">АК</div>
        <div><div class="curator-name">Айгерим К.</div><div class="curator-role">Куратор</div></div>
      </a>
    </div>
  </div>

  <div class="body">
    <div class="profile-header" id="profile-header">
      <!-- filled by JS -->
    </div>

    <div class="two-col">
      <div>
        <div class="section-card">
          <div class="section-head"><div class="section-title">📋 История задач</div></div>
          <div id="task-history"></div>
        </div>
      </div>
      <div>
        <div class="section-card">
          <div class="section-head"><div class="section-title">🧠 AI-профиль</div></div>
          <div class="section-body" id="ai-profile"></div>
        </div>
        <div class="section-card">
          <div class="section-head"><div class="section-title">🛠️ Навыки</div></div>
          <div class="section-body" id="skills-section"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.querySelector('.theme-btn span').textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
  const icon = document.getElementById('theme-icon');
  icon.innerHTML = isDark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

const VOLUNTEERS = {
  1: { name:'Алина Смирнова', initials:'АС', grad:'#10b981,#065f46', status:'active', statusLabel:'● Активна', score:94, hours:42, tasks:7, skills:['SMM','Figma','Дизайн','Контент','Фото'], taskList:[{name:'Фотосъёмка мурал',date:'мар 2026',hours:4,done:true},{name:'SMM фестиваль',date:'апр 2026',hours:8,done:false},{name:'Эко-субботник',date:'фев 2026',hours:6,done:true}] },
  2: { name:'Данияр Мухамедов', initials:'ДМ', grad:'#818cf8,#4338ca', status:'active', statusLabel:'● Активен', score:87, hours:31, tasks:5, skills:['Программирование','Excel','Python','Data'], taskList:[{name:'Помощь библиотека',date:'апр 2026',hours:3,done:false},{name:'SMM фестиваль',date:'апр 2026',hours:5,done:false},{name:'Эко-субботник',date:'мар 2026',hours:6,done:true}] },
  3: { name:'Зарина Нурланова', initials:'ЗН', grad:'#f59e0b,#92400e', status:'pending', statusLabel:'⏳ Откликнулась', score:76, hours:19, tasks:3, skills:['Работа с детьми','Психология','Педагогика'], taskList:[{name:'Библиотека для детей',date:'апр 2026',hours:4,done:false},{name:'Эко-субботник',date:'мар 2026',hours:6,done:true}] },
  4: { name:'Мадина Касенова', initials:'МК', grad:'#ec4899,#9d174d', status:'new', statusLabel:'✦ Новая', score:65, hours:0, tasks:0, skills:['Фотография','Маркетинг','Instagram'], taskList:[] },
  5: { name:'Руслан Ахметов', initials:'РА', grad:'#06b6d4,#164e63', status:'active', statusLabel:'● Активен', score:82, hours:27, tasks:4, skills:['Физ. активность','Организация','Логистика'], taskList:[{name:'Марафон одежды',date:'апр 2026',hours:8,done:false},{name:'Эко-субботник',date:'мар 2026',hours:6,done:true}] },
  6: { name:'Екатерина Петрова', initials:'ЕП', grad:'#a78bfa,#5b21b6', status:'inactive', statusLabel:'○ Неактивна', score:58, hours:8, tasks:1, skills:['Медицина','Психология','Первая помощь'], taskList:[{name:'Уход за животными',date:'фев 2026',hours:8,done:true}] },
};

const params = new URLSearchParams(location.search);
const id = params.get('id') || '1';
const v = VOLUNTEERS[id] || VOLUNTEERS[1];

document.getElementById('vol-page-name').textContent = v.name;

document.getElementById('profile-header').innerHTML = `
  <div class="profile-avatar-lg" style="background:linear-gradient(135deg,${v.grad});color:#fff;">${v.initials}</div>
  <div style="flex:1;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
      <div class="profile-name">${v.name}</div>
      <span class="status-badge status-${v.status}">${v.statusLabel}</span>
    </div>
    <div class="profile-meta">Зарегистрирована · Алматы, Казахстан</div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-primary" onclick="alert('Отправляю сообщение...')">✉️ Написать</button>
      <button class="btn btn-secondary" onclick="alert('Напоминание отправлено')">🔔 Напомнить</button>
    </div>
    <div class="profile-stats">
      <div class="profile-stat"><div class="profile-stat-val">${v.score}%</div><div class="profile-stat-label">AI-скор</div></div>
      <div class="profile-stat"><div class="profile-stat-val">${v.hours} ч</div><div class="profile-stat-label">Отработано</div></div>
      <div class="profile-stat"><div class="profile-stat-val">${v.tasks}</div><div class="profile-stat-label">Задач</div></div>
    </div>
  </div>
`;

document.getElementById('task-history').innerHTML = v.taskList.length
  ? v.taskList.map(t => `<div class="task-hist-row"><div><div style="font-size:13px;font-weight:600;color:var(--text)">${t.name}</div><div style="font-size:11px;color:var(--sub)">${t.date} · ${t.hours} ч</div></div><span class="status-badge ${t.done ? 'status-active' : 'status-pending'}">${t.done ? '✓ Завершено' : '⏳ Идёт'}</span></div>`).join('')
  : '<div style="padding:20px 18px;font-size:13px;color:var(--sub);">Задач ещё нет</div>';

document.getElementById('ai-profile').innerHTML = `
  <div style="margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:3px;"><span>AI-скор</span><span style="color:var(--accent);font-weight:700">${v.score}%</span></div>
    <div class="score-bar"><div class="score-fill" style="width:${v.score}%"></div></div>
  </div>
  <div style="margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:3px;"><span>Надёжность</span><span style="color:var(--accent);font-weight:700">${Math.min(100,v.score+5)}%</span></div>
    <div class="score-bar"><div class="score-fill" style="width:${Math.min(100,v.score+5)}%"></div></div>
  </div>
  <div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:3px;"><span>Вовлечённость</span><span style="color:var(--amber);font-weight:700">${Math.max(40,v.score-10)}%</span></div>
    <div class="score-bar"><div class="score-fill" style="width:${Math.max(40,v.score-10)}%;background:var(--amber)"></div></div>
  </div>
`;

document.getElementById('skills-section').innerHTML = v.skills.map(s => `<span class="skill-chip">${s}</span>`).join('');
</script>
<script type="module">
  import { getMyProfile } from "./supabase-sync.js";

  const profile = await getMyProfile();

  if (profile) {
    const nameEl = document.querySelector(".curator-name");
    if (nameEl) nameEl.textContent = profile.full_name || "Куратор";
  }
</script>
</body>
</html>
